name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. vC.00, vC.01, vC.02)'
        required: true
        type: string
      commit_sha:
        description: 'Commit SHA to release'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Release App
    runs-on: ubuntu-latest
    steps:
      - name: Resolve Ref
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "sha=${{ inputs.commit_sha }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.sha }}
          path: repo_source

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve.outputs.tag }}
          target_commitish: ${{ steps.resolve.outputs.sha }}
          name: Release ${{ steps.resolve.outputs.tag }}
          files: |
            repo_source/chkwinlegit.bat
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
